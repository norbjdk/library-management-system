services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-projekt_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-projekt_password}"
      POSTGRES_DB: "${POSTGRES_DB:-projekt_db}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: projekt
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-secret-key}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}"
      POSTGRES_USER: "${POSTGRES_USER:-projekt_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-projekt_password}"
      POSTGRES_DB: "${POSTGRES_DB:-projekt_db}"
      DB_HOST: "${DB_HOST:-db}"
      DB_PORT: "${DB_PORT:-5432}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200}"
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/api/health/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./web
    image: projekt-web
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./web:/workspace/web
      - web_node_modules:/workspace/web/node_modules
    ports:
      - "${WEB_PORT:-4200}:4200"

volumes:
  postgres_data:
  web_node_modules:
