@if (items().length) {
<nav class="breadcrumb-shell" aria-label="Breadcrumb">
    <ol>
        @for (item of items(); track item.label; let last = $last) {
        <li>
            @if (item.path && !last) {
            <a [routerLink]="item.path">{{ item.label }}</a>
            } @else {
            <span>{{ item.label }}</span>
            }
        </li>
        }
    </ol>
</nav>
}
