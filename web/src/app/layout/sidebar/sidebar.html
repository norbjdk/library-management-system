<aside class="sidebar-surface w-full text-white flex flex-col">
    <div class="px-6 py-5 border-b border-slate-700/80">
        <p class="text-xs uppercase tracking-widest text-slate-400">Nawigacja</p>
        <h2 class="brand-mark text-xl mt-2">Menu biblioteki</h2>
    </div>

    <nav class="flex-1 px-3 py-4">
        <ul class="flex flex-col gap-1">
            @for (item of menuItems(); track item.path) {
            <li>
                <a [routerLink]="item.path" routerLinkActive="bg-white/12 text-white" class="flex items-center gap-3 px-3 py-3 rounded-xl text-sm text-slate-300 hover:bg-white/10
                hover:text-white transition-colors">
                    <span>{{ item.icon }}</span>
                    <span>{{ item.label }}</span>
                </a>
            </li>
            }
        </ul>
    </nav>

    @if (!isLoggedIn()) {
    <div class="px-6 py-4 border-t border-slate-700">
        <p class="text-xs uppercase tracking-widest text-slate-400">Konto gościa</p>
        <p class="text-sm font-medium mt-1">Przeglądaj katalog i kategorie bez logowania.</p>
        <p class="text-xs text-slate-400 mt-1">Załóż konto, aby rezerwować książki i zarządzać wypożyczeniami.</p>
        <div class="mt-4 flex gap-2">
            <a routerLink="/login" class="secondary-button flex-1 !rounded-full !px-3 !py-2 !text-sm">
                Logowanie
            </a>
            <a routerLink="/login" [queryParams]="{ mode: 'register' }"
                class="accent-button flex-1 !rounded-full !px-3 !py-2 !text-sm">
                Rejestracja
            </a>
        </div>
    </div>
    }
</aside>
