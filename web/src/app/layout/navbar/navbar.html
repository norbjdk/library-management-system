<nav class="nav-surface text-white px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
    <a routerLink="/catalog" class="flex items-center gap-3 no-underline">
        <span class="text-2xl">📖</span>
        <div>
            <p class="text-xs uppercase tracking-[0.18em] text-slate-400">System biblioteczny</p>
            <span class="brand-mark text-xl font-semibold tracking-tight">Biblioteka</span>
        </div>
    </a>

    <div class="flex items-center gap-3">
        @if (isLoggedIn()) {
        <div class="text-right">
            <p class="text-sm font-medium">{{ fullName() }}</p>
            <p class="text-xs text-slate-400">{{ role() }}</p>
        </div>
        <button (click)="logout()"
            class="rounded-full bg-red-700 px-4 py-2 text-sm font-medium transition-colors hover:bg-red-600">
            Wyloguj
        </button>
        } @else {
        <div class="hidden sm:block text-right">
            <p class="text-sm font-medium">{{ fullName() }}</p>
            <p class="text-xs text-slate-400">{{ role() }}</p>
        </div>
        <a routerLink="/login" class="secondary-button !rounded-full !px-4 !py-2 !text-sm">
            Logowanie
        </a>
        <a routerLink="/login" [queryParams]="{ mode: 'register' }"
            class="accent-button !rounded-full !px-4 !py-2 !text-sm">
            Rejestracja
        </a>
        }
    </div>
</nav>
