<nav class="nav-surface text-white px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
    <div class="flex items-center gap-2">
        <span class="text-2xl">📖</span>
        <span class="brand-mark text-xl font-bold tracking-wide">LibraryMS</span>
    </div>

    <ul class="hidden xl:flex items-center gap-1">
        @for (item of navItems(); track item.path) {
        <li>
            <a [routerLink]="item.path" routerLinkActive="bg-slate-600"
                class="flex items-center gap-1 px-3 py-2 rounded-full text-sm hover:bg-white/10 transition-colors">
                <span>{{ item.icon }}</span>
                <span>{{ item.label }}</span>
            </a>
        </li>
        }
    </ul>

    <div class="flex items-center gap-3">
        <div class="text-right">
            <p class="text-sm font-medium">{{ fullName() }}</p>
            <p class="text-xs text-slate-400">{{ role() }}</p>
        </div>
        <button (click)="logout()" class="bg-red-600 hover:bg-red-700 px-3 py-2 rounded-full text-sm transition-colors">
            Wyloguj
        </button>
    </div>
</nav>
