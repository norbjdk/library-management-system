<div class="min-h-screen bg-slate-100 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">

        <div class="text-center mb-8">
            <span class="text-5xl">📖</span>
            <h1 class="text-2xl font-bold text-slate-800 mt-3">LibraryMS</h1>
            <p class="text-sm text-slate-500 mt-1">Zaloguj się do systemu</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">
                    Email
                </label>
                <input type="email" [(ngModel)]="email" placeholder="jan.kowalski@biblioteka.pl"
                    class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">
                    Hasło
                </label>
                <input type="password" [(ngModel)]="password" placeholder="••••••••"
                    class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
            </div>

            <button (click)="onSubmit()"
                class="w-full bg-slate-800 hover:bg-slate-700 text-white py-2.5 rounded-lg text-sm font-medium transition-colors mt-2">
                Zaloguj się
            </button>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6">
            Library Management System © 2026
        </p>
    </div>
</div>
