<div class="auth-stage">
    <section class="panel-card p-8 md:p-10 flex flex-col justify-center w-full max-w-xl">
        <div class="flex rounded-full bg-slate-100 p-1 mb-8">
            <button type="button" (click)="setMode('login')"
                class="flex-1 rounded-full px-4 py-2 text-sm font-semibold transition-colors"
                [class.bg-white]="mode() === 'login'" [class.text-slate-900]="mode() === 'login'"
                [class.text-slate-500]="mode() !== 'login'">
                Logowanie
            </button>
            <button type="button" (click)="setMode('register')"
                class="flex-1 rounded-full px-4 py-2 text-sm font-semibold transition-colors"
                [class.bg-white]="mode() === 'register'" [class.text-slate-900]="mode() === 'register'"
                [class.text-slate-500]="mode() !== 'register'">
                Rejestracja
            </button>
        </div>

        <div class="mb-6">
            <p class="page-kicker">{{ mode() === 'login' ? 'Powrót do systemu' : 'Nowe konto czytelnika' }}</p>
            <h2 class="text-3xl text-slate-900">
                {{ mode() === 'login' ? 'Zaloguj się do panelu.' : 'Utwórz konto i przejdź od razu do katalogu.' }}
            </h2>
        </div>

        @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-2xl mb-5">
            {{ error() }}
        </div>
        }

        @if (mode() === 'login') {
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <input type="email" [(ngModel)]="email" autocomplete="off" autocapitalize="off" spellcheck="false"
                    placeholder="jan.kowalski@biblioteka.pl"
                    class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white/90" />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Hasło</label>
                <input type="password" [(ngModel)]="password" autocomplete="current-password" placeholder="••••••••"
                    class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white/90" />
            </div>

            <button (click)="onSubmit()" [disabled]="loading()" class="accent-button w-full mt-2">
                {{ loading() ? 'Logowanie...' : 'Zaloguj się' }}
            </button>
        </div>
        } @else {
        <div class="space-y-4">
            <div class="grid gap-4 md:grid-cols-2">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Imię</label>
                    <input type="text" [(ngModel)]="registration.first_name"
                        class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white/90" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Nazwisko</label>
                    <input type="text" [(ngModel)]="registration.last_name"
                        class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white/90" />
                </div>
            </div>

            <div class="grid gap-4 md:grid-cols-2">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                    <input type="email" [(ngModel)]="registration.email" autocomplete="off" autocapitalize="off"
                        spellcheck="false"
                        class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white/90" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Data urodzenia</label>
                    <input type="date" [(ngModel)]="registration.birthdate"
                        class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white/90" />
                </div>
            </div>

            <div class="grid gap-4 md:grid-cols-2">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Hasło</label>
                    <input type="password" [(ngModel)]="registration.password" autocomplete="new-password"
                        class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white/90" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Powtórz hasło</label>
                    <input type="password" [(ngModel)]="registration.confirmPassword" autocomplete="new-password"
                        class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white/90" />
                </div>
            </div>

            <button (click)="onRegister()" [disabled]="loading()" class="accent-button w-full mt-2">
                {{ loading() ? 'Tworzenie konta...' : 'Utwórz konto' }}
            </button>
        </div>
        }

        <p class="text-center text-xs text-slate-400 mt-6">
            System biblioteczny © 2026
        </p>
    </section>
</div>
